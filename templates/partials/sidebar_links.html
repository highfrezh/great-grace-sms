{% url 'accounts:dashboard' as dashboard_url %}
{% with request.resolver_match.app_name as current_app %}

<!-- Dashboard -->
<a href="{{ dashboard_url }}"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if request.path == dashboard_url %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if request.path == dashboard_url %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Dashboard</span>
</a>

<!-- Students -->
<a href="#"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if current_app == 'students' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if current_app == 'students' %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Students</span>
</a>

<!-- Staff -->
<div x-data="{ staffOpen: {% if current_app == 'staff' %}true{% else %}false{% endif %} }">

  <button @click="staffOpen = !staffOpen"
          class="flex items-center w-full px-4 py-2.5 text-sm text-white transition
                 {% if current_app == 'staff' %}opacity-100{% else %}opacity-70 hover:opacity-100{% endif %}"
          {% if current_app == 'staff' %}
          style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
          {% endif %}>
    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>
    <span x-show="sidebarOpen" class="ml-3 flex-1 text-left whitespace-nowrap">
      Staff
    </span>
    <svg x-show="sidebarOpen"
         :class="staffOpen ? 'rotate-180' : ''"
         class="w-4 h-4 transition-transform duration-200 shrink-0"
         fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <div x-show="staffOpen" x-transition x-cloak class="mt-1 space-y-0.5">

    <!-- All Staff -->
    <a href="{% url 'staff:staff_list' %}"
       class="submenu-link flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'staff_list' %}active opacity-100{% else %}opacity-50 hover:opacity-90{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">All Staff</span>
    </a>

    <!-- Add Staff -->
    <a href="{% url 'staff:staff_create' %}"
       class="submenu-link flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'staff_create' %}active opacity-100{% else %}opacity-50 hover:opacity-90{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4v16m8-8H4"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Add Staff</span>
    </a>

  </div>
</div>

<!-- Academics -->
<div x-data="{ academicsOpen: {% if current_app == 'academics' %}true{% else %}false{% endif %} }">

  <!-- Toggle -->
  <button @click="academicsOpen = !academicsOpen"
          class="academics-toggle-btn flex items-center w-full px-4 py-2.5 text-sm text-white transition
                 {% if current_app == 'academics' %}active{% else %}opacity-70 hover:opacity-100{% endif %}">
    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13
               C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477
               14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247
               18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
    </svg>
    <span x-show="sidebarOpen" class="ml-3 flex-1 text-left whitespace-nowrap">
      Academics
    </span>
    <svg x-show="sidebarOpen"
         :class="academicsOpen ? 'rotate-180' : ''"
         class="w-4 h-4 transition-transform duration-200 shrink-0"
         fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <!-- Submenu -->
  <div x-show="academicsOpen" x-transition x-cloak class="mt-1 space-y-0.5">

    <!-- Sessions -->
    <a href="{% url 'academics:session_list' %}"
       class="submenu-item flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'session_list' or request.resolver_match.url_name == 'session_create' or request.resolver_match.url_name == 'session_edit' %}
              active{% else %}inactive{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5
                 a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Sessions</span>
    </a>

    <!-- Terms -->
    <a href="{% url 'academics:term_list' %}"
       class="submenu-item flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'term_list' or request.resolver_match.url_name == 'term_create' or request.resolver_match.url_name == 'term_edit' %}
              active{% else %}inactive{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                 M9 5a2 2 0 002 2h2a2 2 0 002-2"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Terms</span>
    </a>

    <!-- Class Levels -->
    <a href="{% url 'academics:class_level_list' %}"
       class="submenu-item flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'class_level_list' or request.resolver_match.url_name == 'class_level_create' or request.resolver_match.url_name == 'class_level_edit' %}
              active{% else %}inactive{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9
                 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2
                 a1 1 0 011 1v5m-4 0h4"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Class Levels</span>
    </a>

    <!-- Classes -->
    <a href="{% url 'academics:class_arm_list' %}"
       class="submenu-item flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'class_arm_list' or request.resolver_match.url_name == 'class_arm_create' or request.resolver_match.url_name == 'class_arm_edit' %}
              active{% else %}inactive{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283
                 -.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283
                 .356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Classes</span>
    </a>

    <!-- Subjects -->
    <a href="{% url 'academics:subject_list' %}"
       class="submenu-item flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'subject_list' or request.resolver_match.url_name == 'subject_create' or request.resolver_match.url_name == 'subject_edit' %}
              active{% else %}inactive{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13
                 C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477
                 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247
                 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Subjects</span>
    </a>

    <!-- Assignments -->
    <a href="{% url 'academics:assignment_list' %}"
       class="submenu-link flex items-center gap-2 py-2 text-xs text-white transition
              {% if request.resolver_match.url_name == 'assignment_list' or request.resolver_match.url_name == 'assignment_create' %}active opacity-100{% else %}opacity-50 hover:opacity-90{% endif %}">
      <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
      </svg>
      <span x-show="sidebarOpen" class="whitespace-nowrap">Assign Subjects</span>
    </a>

  </div>
</div>

<!-- Examinations -->
<a href="#"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if current_app == 'examinations' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if current_app == 'examinations' %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Examinations</span>
</a>

<!-- Results -->
<a href="#"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if current_app == 'results' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if current_app == 'results' %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Results</span>
</a>

<!-- Scheme of Work -->
<a href="#"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if current_app == 'schemes' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if current_app == 'schemes' %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Scheme of Work</span>
</a>

<!-- Timetable -->
<a href="#"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if current_app == 'timetable' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if current_app == 'timetable' %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Timetable</span>
</a>

<!-- Promotions -->
<a href="#"
   class="flex items-center px-4 py-2.5 transition text-white
          {% if current_app == 'promotions' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}"
   {% if current_app == 'promotions' %}
   style="background:rgba(133,26,16,0.6);border-left:3px solid #C2B0A1;"
   {% endif %}>
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
  </svg>
  <span x-show="sidebarOpen" class="ml-3 text-sm whitespace-nowrap">Promotions</span>
</a>

{% endwith %}
