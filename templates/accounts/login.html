{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Great Grace SMS</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center p-4"
      style="background: linear-gradient(135deg, #635E57 0%, #851A10 100%);">

  <div class="w-full max-w-md">

    <!-- Logo & School Name -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4">
        <img src="{% static 'images/logo.png' %}" alt="Great Grace School Logo" class="w-12 h-12 object-contain">
      </div>
      <h1 class="text-2xl font-bold text-white">Great Grace Schools</h1>
      <p class="text-sm mt-1" style="color:#C2B0A1;">School Management System</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold mb-1" style="color:#635E57;">Welcome back</h2>
      <p class="text-gray-500 text-sm mb-6">Sign in to your account to continue</p>

      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
            {% if message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% elif message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% else %}bg-orange-50 text-orange-700 border border-orange-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'accounts:login' %}">
        {% csrf_token %}

        <div class="mb-4">
          <label class="block text-sm font-medium mb-1" style="color:#635E57;">
            Username / Admission Number
          </label>
          <input
            type="text"
            name="username"
            required
            autofocus
            placeholder="Enter your username"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm
                   focus:outline-none focus:ring-2 focus:border-transparent
                   placeholder-gray-400 transition"
            style="--focus-ring-color:#851A10;"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium mb-1" style="color:#635E57;">
            Password
          </label>
          <input
            type="password"
            name="password"
            required
            placeholder="Enter your password"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm
                   focus:outline-none focus:ring-2 focus:border-transparent
                   placeholder-gray-400 transition"
          />
        </div>

        <button
          type="submit"
          class="w-full text-white font-semibold py-2.5 rounded-lg text-sm
                 transition duration-200 cursor-pointer hover:opacity-90"
          style="background-color:#851A10;">
          Sign In
        </button>

      </form>
    </div>

    <p class="text-center text-xs mt-6" style="color:#C2B0A1;">
      &copy; 2025 Great Grace Schools. All rights reserved.
    </p>

  </div>

</body>
</html>
